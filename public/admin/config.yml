# Decap CMS — Guerlain PEX
# Authentification via Netlify Identity + Git Gateway
# Activer dans Netlify : Settings → Identity → Enable
#                        Settings → Identity → Services → Git Gateway → Enable

backend:
  name: git-gateway
  branch: main

media_folder: public/products
public_folder: /products

# Pour tester en local : npx netlify-cms-proxy-server (décommenter la ligne ci-dessous)
# local_backend: true

# ── Schéma partagé entre toutes les régions ────────────────────────────────────
x-region-fields: &region_fields
  - label: "Nom de la région"
    name: region
    widget: string

  - label: "Navigation"
    name: nav
    widget: object
    collapsed: true
    fields:
      - { label: "Label ouverture", name: opening, widget: string }
      - { label: "Label collection", name: collection, widget: string }
      - { label: "Label closing", name: closing, widget: string }

  - label: "Section d'ouverture (Hero)"
    name: hero
    widget: object
    fields:
      - { label: "Mention en-tête", name: eyebrow, widget: string }
      - { label: "Titre — ligne 1", name: title1, widget: string }
      - { label: "Titre — ligne 2 (italique)", name: title2, widget: string }
      - { label: "Événement", name: event, widget: string, hint: "Ex : PEX Bangkok" }
      - { label: "Année", name: year, widget: string }
      - { label: "Mention pied de page (gauche)", name: tagline, widget: string }
      - { label: "Mention pied de page (droite)", name: footer_right, widget: string }

  - label: "Section introduction"
    name: intro
    widget: object
    fields:
      - { label: "Chapeau", name: eyebrow, widget: string }
      - label: "Paragraphes"
        name: lines
        widget: list
        hint: "Chaque entrée est un paragraphe distinct affiché à l'écran."
        field:
          label: "Paragraphe"
          name: line
          widget: text

  - label: "Section de clôture"
    name: closing
    widget: object
    fields:
      - { label: "Chapeau", name: eyebrow, widget: string }
      - { label: "Titre principal", name: heading, widget: string }
      - { label: "Sous-titre", name: subheading, widget: string }
      - { label: "Tagline", name: tagline, widget: string }
      - { label: "Pied de page (gauche)", name: footer_left, widget: string }
      - { label: "Pied de page (droite)", name: footer_right, widget: string }

  - label: "Familles de parfums"
    name: families
    widget: list
    summary: "{{fields.name}}"
    fields:
      - { label: "Identifiant (sans espace ni accent)", name: id, widget: string, hint: "Ex : shalimar, bee-bottle. Ne pas modifier sans raison." }
      - { label: "Numéro", name: index, widget: number }
      - { label: "Nom de la famille", name: name, widget: string }
      - { label: "Accroche", name: tagline, widget: string }
      - label: "Produits"
        name: products
        widget: list
        summary: "{{fields.name}} — {{fields.artist}}"
        fields:
          - { label: "Identifiant (sans espace ni accent)", name: id, widget: string }
          - label: "Photo produit"
            name: image
            widget: image
            required: false
            hint: "Glisser-déposer une image JPG."
          - { label: "Nom du produit", name: name, widget: string }
          - { label: "Artiste / Maison", name: artist, widget: string }
          - { label: "Spécialité de l'artiste", name: specialty, widget: string, required: false }
          - { label: "Année de création", name: year, widget: string }
          - { label: "Description", name: description, widget: text }
          - label: "Notes olfactives (liste simple)"
            name: notes
            widget: list
            required: false
            hint: "Laisser vide si aucune note, ou si vous utilisez la pyramide ci-dessous."
            field:
              label: "Note"
              name: note
              widget: string
          - label: "Notes olfactives — pyramide (Top / Heart / Base)"
            name: notesPyramid
            widget: list
            required: false
            hint: "Utiliser uniquement pour les notes en 3 niveaux. Sinon, utiliser la liste simple ci-dessus."
            summary: "{{fields.tier}}"
            fields:
              - { label: "Niveau (Top / Heart / Base)", name: tier, widget: string }
              - label: "Notes"
                name: items
                widget: list
                field:
                  label: "Note"
                  name: item
                  widget: string
          - { label: "Prix", name: price, widget: string, required: false, hint: "Ex : 20 000 €" }
          - { label: "Édition", name: edition, widget: string, required: false }
          - { label: "Volume", name: volume, widget: string, required: false }

# ── Collections ────────────────────────────────────────────────────────────────
collections:
  - name: regions
    label: "Régions"
    files:

      - name: bangkok
        label: "🇹🇭 Bangkok"
        file: src/content/regions/bangkok.json
        fields: *region_fields

      - name: paris
        label: "🇫🇷 Paris"
        file: src/content/regions/paris.json
        fields: *region_fields

      - name: milan
        label: "🇮🇹 Milan"
        file: src/content/regions/milan.json
        fields: *region_fields

      - name: new-york
        label: "🇺🇸 New York"
        file: src/content/regions/new-york.json
        fields: *region_fields

      - name: london
        label: "🇬🇧 Londres"
        file: src/content/regions/london.json
        fields: *region_fields

      - name: tokyo
        label: "🇯🇵 Tokyo"
        file: src/content/regions/tokyo.json
        fields: *region_fields

      - name: shanghai
        label: "🇨🇳 Shanghai"
        file: src/content/regions/shanghai.json
        fields: *region_fields

      - name: seoul
        label: "🇰🇷 Séoul"
        file: src/content/regions/seoul.json
        fields: *region_fields

      - name: los-angeles
        label: "🇺🇸 Los Angeles"
        file: src/content/regions/los-angeles.json
        fields: *region_fields

      - name: dubai
        label: "🇦🇪 Dubaï"
        file: src/content/regions/dubai.json
        fields: *region_fields
